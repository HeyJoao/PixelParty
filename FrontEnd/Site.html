<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelParty</title>
  <link rel="stylesheet" href="Frontendbonito.css" />
</head>
<body>
  <div class="container">
    <!-- HOME -->
    <div id="homeScreen" class="painel">
      <h1>PixelParty</h1>

      <input id="usernameInput" type="text" placeholder="Username" />

      <div class="botoes">
        <button id="playBtn">JOGAR</button>
        <button id="rankingBtn">RANKING</button>
        <button id="createMatchBtn">CRIAR PARTIDA</button>
      </div>
    </div>

    <!-- GAME -->
    <div id="gameScreen" class="painel hidden">
      <h1>PixelParty - Jogo</h1>

      <div class="game-header">
        <div class="timer">⏱ Tempo: <span id="timerValue">30</span>s</div>
        <div class="score">⭐ Pontos: <span id="scoreValue">0</span></div>
      </div>

      <div class="game-content">
        <div class="image-box">
          <img id="randomImage" src="" alt="Imagem do jogo" />
        </div>

        <div class="guess-area">
          <input id="guessInput" type="text" placeholder="Digite seu chute..." />
          <button id="submitGuessBtn">Enviar</button>
        </div>

        <p id="statusMessage" class="status-message"></p>

        <div class="game-actions">
          <button id="restartBtn">Reiniciar rodada</button>
          <button id="backBtn">Voltar</button>
        </div>
      </div>
    </div>

    <!-- RANKING -->
    <div id="rankingScreen" class="painel hidden">
      <h1>PixelParty - Ranking</h1>

      <div class="ranking-wrap">
        <table class="ranking-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Pontos (maior score)</th>
            </tr>
          </thead>
          <tbody id="rankingBody"></tbody>
        </table>

        <p class="ranking-total">Total de jogadores: <span id="rankingCount">0</span></p>

        <div class="ranking-actions">
          <button id="clearRankingBtn">Limpar Ranking</button>
          <button id="rankingBackBtn">Voltar</button>
        </div>
      </div>
    </div>

    <!-- CREATE MATCH -->
    <div id="createMatchScreen" class="painel hidden dark-theme">
      <h1>PixelParty</h1>

      <div class="create-wrap">
        <label for="themeSelect">TEMAS:</label>
        <select id="themeSelect">
          <option value="geral">Geral</option>
          <option value="animais">Animais</option>
          <option value="veiculos">Veículos</option>
          <option value="comida">Comida</option>
          <option value="natureza">Natureza</option>
        </select>

        <label for="roundsInput">RODADAS:</label>
        <input id="roundsInput" type="number" min="1" step="1" placeholder="Ex: 5" />

        <label for="roomPassword">SENHA (opcional):</label>
        <input id="roomPassword" type="text" placeholder="Senha da sala" />

        <button id="generateRoomBtn">Gerar código</button>

        <div class="room-code-box">
          <span>Código da partida:</span>
          <strong id="roomCodeText">-</strong>
        </div>

        <div class="create-actions">
          <button id="copyRoomCodeBtn">Copiar código</button>
          <button id="createBackBtn">Voltar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="Frontendjs.js"></script>
</body>
</html>
